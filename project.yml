name: VaultApp  # <--- This must match the name in your xcodebuild command
options:
  bundleIdPrefix: com.alexanderfisharman
targets:
  VaultApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VaultApp/Sources
      - path: VaultApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexanderfisharman.VaultApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: VaultApp/Resources/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: VaultApp/Sources/VaultBridge.h
        TARGETED_DEVICE_FAMILY: "1"
        LIBRARY_SEARCH_PATHS: 
          - $(inherited) 
          - "$(PROJECT_DIR)/VaultApp/Libs"
        OTHER_LDFLAGS: 
          - $(inherited) 
          - "-lvault_core"
          - "-Wl,-no_warn_duplicate_libraries"
        ENABLE_BITCODE: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.0"