name: VaultApp
options:
  bundleIdPrefix: com.yourname
targets:
  VaultApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: 
      - VaultApp/Sources
      - VaultApp/Resources
    info:
      path: VaultApp/Info.plist
    settings:
      SWIFT_OBJC_BRIDGING_HEADER: VaultApp/Sources/VaultBridge.h
      OTHER_LDFLAGS: -L${SRCROOT}/VaultApp/Libs -lvault_core
      LIBRARY_SEARCH_PATHS: $(inherited) ${SRCROOT}/VaultApp/Libs
      ENABLE_BITCODE: NO