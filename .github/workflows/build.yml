name: Build Surgical Vault IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim

      - name: Download Custom SDK
        run: |
          mkdir -p ~/SDKs
          curl -L "https://github.com/xybp888/iOS-SDKs/releases/download/iOS26.3-SDKs/iPhoneOS26.3.sdk.zip" -o sdk.zip
          unzip -q sdk.zip -d ~/SDKs/
          echo "SDKROOT=$HOME/SDKs/iPhoneOS26.3.sdk" >> $GITHUB_ENV

      - name: Build Rust Core
        run: |
          cd VaultCore
          cargo build --target aarch64-apple-ios --release
          mkdir -p ../VaultApp/Libs
          cp target/aarch64-apple-ios/release/libvault_core.a ../VaultApp/Libs/

      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build iOS App
        run: |
          xcodebuild -project VaultApp.xcodeproj \
            -scheme VaultApp \
            -sdk "$SDKROOT" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Ensure the path matches where xcodebuild drops the unsigned .app
          cp -r build/Build/Products/Release-iphoneos/VaultApp.app Payload/
          zip -r VaultApp.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SurgicalVault-IPA
          path: VaultApp.ipa